<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mona Lore — Desktop</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Lora&family=Special+Elite&display=swap" rel="stylesheet">

<style>
body {
    background: #EFCE7B20;
    margin: 0;
    font-family: 'Lora', serif;
}

#header {
    background: #D3C2CD;
    padding: 25px;
    font-size: 32px;
    font-family: 'Cormorant Garamond', serif;
    color: #2B2B23;
    border-bottom: 6px solid #D17089;
    text-align: center;
}

.post-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    text-align: center;
    margin-top: 20px;
}

.slider {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
}

.slider img {
    width: 260px;
    border-radius: 12px;
}

.slider button {
    background: none;
    border: none;
    font-size: 28px;
    color: #6777B680;
    cursor: pointer;
}

.notes-toggle {
    width: 260px;
    margin: 10px auto;
    color: #6777B6;
    cursor: pointer;
}

.notes-panel {
    width: 260px;
    margin: 0 auto 25px;
    font-family: 'Special Elite', monospace;
    display: none;
}
</style>

</head>
<body>

<div id="header">Mona Lore</div>
<div id="feed"></div>

<script>
fetch("https://honeyidoll.github.io/Photos/aphotos.json")
  .then(r => r.json())
  .then(data => {

      const feed = document.getElementById("feed");

      Object.keys(data.groups).forEach(name => {
          const group = data.groups[name];
          const images = group.photos;
          const notes = group.notes || [];

          const title = document.createElement("div");
          title.className = "post-title";
          title.textContent = name;
          feed.appendChild(title);

          const slider = document.createElement("div");
          slider.className = "slider";

          const left = document.createElement("button");
          left.textContent = "‹";

          const right = document.createElement("button");
          right.textContent = "›";

          const img = document.createElement("img");
          let index = 0;
          img.src = `https://honeyidoll.github.io/Photos/${images[index]}`;

          left.onclick = () => {
              if (index > 0) index--;
              img.src = `https://honeyidoll.github.io/Photos/${images[index]}`;
          };

          right.onclick = () => {
              if (index < images.length - 1) index++;
              img.src = `https://honeyidoll.github.io/Photos/${images[index]}`;
          };

          slider.appendChild(left);
          slider.appendChild(img);
          slider.appendChild(right);
          feed.appendChild(slider);

          const toggle = document.createElement("div");
          toggle.className = "notes-toggle";
          toggle.textContent = notes.length ? `View ${notes.length} notes` : "No notes";
          feed.appendChild(toggle);

          const panel = document.createElement("div");
          panel.className = "notes-panel";

          notes.forEach(n => {
              const div = document.createElement("div");
              div.innerHTML = `<strong>mona</strong> ${n}`;
              panel.appendChild(div);
          });

          feed.appendChild(panel);

          toggle.onclick = () => {
              panel.style.display = panel.style.display === "none" ? "block" : "none";
          };
      });
});
</script>

</body>
</html>
