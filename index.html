<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google Drive Auto Gallery</title>

<style>
/* --- Container --- */
.gallery-container {
    position: relative;
    width: 350px;
    margin: 40px auto;
    overflow: hidden;
}

/* --- Track --- */
.gallery-track {
    display: flex;
    transition: transform 0.5s ease;
}

/* --- Slide --- */
.slide {
    min-width: 100%;
    text-align: center;
}

/* --- Square Ratio Frame (Instagram standard) --- */
.square-frame {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* --- Image inside square --- */
.square-frame img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
}

/* --- Caption --- */
.caption {
    margin-top: 8px;
    font-family: "Courier New", monospace;
    color: #ddd;
}

/* --- Arrows --- */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 32px;
    cursor: pointer;
    user-select: none;
    padding: 10px;
    color: white;
}

.left { left: 0; }
.right { right: 0; }
</style>

</head>
<body>

<div class="gallery-container">
    <div class="arrow left" id="prev">&#10094;</div>
    <div class="arrow right" id="next">&#10095;</div>

    <div class="gallery-track" id="track"></div>
</div>

<script>
// --------------------------------------------------
// FIXED VERSION — NO FETCH (Google blocks it)
// Add your Google Drive file IDs here
// --------------------------------------------------
const images = [
    "FILE_ID_1",
    "FILE_ID_2",
    "FILE_ID_3"
];

// Build slides
const track = document.getElementById("track");

images.forEach((id, index) => {
    const slide = document.createElement("div");
    slide.className = "slide";

    slide.innerHTML = `
        <div class="square-frame">
            <img src="https://drive.google.com/uc?export=view&id=${id}">
        </div>
        <div class="caption">Image ${index + 1}</div>
    `;

    track.appendChild(slide);
});

// --------------------------------------------------
// SLIDER LOGIC
// --------------------------------------------------
function initSlider() {
    const slides = document.querySelectorAll(".slide");
    let index = 0;

    document.getElementById("next").onclick = () => {
        index = (index + 1) % slides.length;
        track.style.transform = `translateX(-${index * 100}%)`;
    };

    document.getElementById("prev").onclick = () => {
        index = (index - 1 + slides.length) % slides.length;
        track.style.transform = `translateX(-${index * 100}%)`;
    };
}

initSlider();
</script>

</body>
</html>
