<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multi-Group Feed</title>
</head>
<body>

<div id="feed"></div>

<script>
fetch("https://honeyidoll.github.io/Photos/aphotos.json")
  .then(response => response.json())
  .then(data => {
      const feed = document.getElementById("feed");

      Object.keys(data.groups).forEach(groupName => {
          const group = data.groups[groupName];
          const images = group.photos;

          const post = document.createElement("div");
          post.style.marginBottom = "40px";

          const title = document.createElement("h2");
          title.textContent = groupName + " (Group " + group.id + ")";
          post.appendChild(title);

          const slider = document.createElement("div");
          slider.style.display = "flex";
          slider.style.alignItems = "center";
          slider.style.gap = "10px";

          const left = document.createElement("button");
          left.textContent = "<";

          const right = document.createElement("button");
          right.textContent = ">";

          const img = document.createElement("img");
          img.width = 200;

          let index = 0;
          img.src = "https://honeyidoll.github.io/Photos/" + images[index];

          left.onclick = () => {
              if (index > 0) index--;
              img.src = "https://honeyidoll.github.io/Photos/" + images[index];
          };

          right.onclick = () => {
              if (index < images.length - 1) index++;
              img.src = "https://honeyidoll.github.io/Photos/" + images[index];
          };

          slider.appendChild(left);
          slider.appendChild(img);
          slider.appendChild(right);

          post.appendChild(slider);
          feed.appendChild(post);
      });
  });
</script>

</body>
</html>
