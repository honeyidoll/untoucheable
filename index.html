<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google Drive Auto Gallery</title>

<style>
/* --- Container --- */
.gallery-container {
    position: relative;
    width: 350px;
    margin: 40px auto;
    overflow: hidden;
}

/* --- Track --- */
.gallery-track {
    display: flex;
    transition: transform 0.5s ease;
}

/* --- Slide --- */
.slide {
    min-width: 100%;
    text-align: center;
}

/* --- Square Ratio Frame (Instagram standard) --- */
.square-frame {
    width: 100%;
    aspect-ratio: 1 / 1; /* perfect square */
    background: black;   /* black fill for non-square images */
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* --- Image inside square --- */
.square-frame img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* preserves image, adds black bars */
    background: black;
}

/* --- Caption --- */
.caption {
    margin-top: 8px;
    font-family: "Courier New", monospace;
    color: #ddd;
}

/* --- Arrows --- */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 32px;
    cursor: pointer;
    user-select: none;
    padding: 10px;
    color: white;
}

.left { left: 0; }
.right { right: 0; }
</style>

</head>
<body>

<div class="gallery-container">
    <div class="arrow left" id="prev">&#10094;</div>
    <div class="arrow right" id="next">&#10095;</div>

    <div class="gallery-track" id="track"></div>
</div>

<script>
// ---- CONFIG ----
const FOLDER_ID = "1Vqx6_4vN6m06wIOfIFusEbXxqMokGgHA";

// Google Drive public folder feed
const FEED_URL =
  `https://drive.google.com/embeddedfolderview?id=${FOLDER_ID}#grid`;

fetch(FEED_URL)
  .then(res => res.text())
  .then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");

      // Extract all image file IDs from the embedded folder view
      const images = [...doc.querySelectorAll("img")].map(img => {
          const src = img.getAttribute("src");
          const id = src.match(/\/d\/(.*?)\//)?.[1];
          return id;
      }).filter(Boolean);

      const track = document.getElementById("track");

      images.forEach((id, index) => {
          const slide = document.createElement("div");
          slide.className = "slide";

          slide.innerHTML = `
              <div class="square-frame">
                  <img src="https://drive.google.com/uc?export=view&id=${id}">
              </div>
              <div class="caption">Image ${index + 1}</div>
          `;

          track.appendChild(slide);
      });

      initSlider();
  });

// ---- SLIDER LOGIC ----
function initSlider() {
    const track = document.getElementById("track");
    const slides = document.querySelectorAll(".slide");
    let index = 0;

    document.getElementById("next").onclick = () => {
        index = (index + 1) % slides.length;
        track.style.transform = `translateX(-${index * 100}%)`;
    };

    document.getElementById("prev").onclick = () => {
        index = (index - 1 + slides.length) % slides.length;
        track.style.transform = `translateX(-${index * 100}%)`;
    };
}
</script>

</body>
</html>
