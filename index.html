<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Instagram Ratio Swipe Gallery</title>

<style>
    body {
        background: #f4ecd8;
        font-family: "Courier New", monospace;
        margin: 0;
        padding: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #3b2f2f;
    }

    .gallery-container {
        width: 350px; /* Instagram width */
        height: 438px; /* Instagram 4:5 ratio */
        overflow: hidden;
        position: relative;
    }

    .gallery-track {
        display: flex;
        transition: transform 0.35s ease;
        will-change: transform;
    }

    .slide {
        min-width: 350px;
        height: 438px; /* 4:5 ratio */
        border-radius: 12px;
        overflow: hidden;
        border: 2px solid #c2b59b;
        background: #faf5e6;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        position: relative;
    }

    .slide img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* preserves IG look */
    }

    .caption {
        position: absolute;
        bottom: 0;
        width: 100%;
        padding: 12px;
        background: rgba(0,0,0,0.45);
        color: #fff;
        font-size: 14px;
        text-align: center;
        letter-spacing: 1px;
    }

    .arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 32px;
        color: #3b2f2f;
        cursor: pointer;
        user-select: none;
        padding: 10px;
    }

    .arrow.left { left: -40px; }
    .arrow.right { right: -40px; }
</style>

</head>
<body>

<div class="gallery-container">
    <div class="arrow left">&#10094;</div>
    <div class="arrow right">&#10095;</div>

    <div class="gallery-track" id="track">

        <div class="slide">
            <img src="https://drive.google.com/uc?export=view&id=FILE_ID_1">
            <div class="caption">Description for image 1</div>
        </div>

        <div class="slide">
            <img src="https://drive.google.com/uc?export=view&id=FILE_ID_2">
            <div class="caption">Description for image 2</div>
        </div>

        <div class="slide">
            <img src="https://drive.google.com/uc?export=view&id=FILE_ID_3">
            <div class="caption">Description for image 3</div>
        </div>

    </div>
</div>

<script>
    const track = document.getElementById("track");
    const slides = document.querySelectorAll(".slide");
    const prev = document.querySelector(".arrow.left");
    const next = document.querySelector(".arrow.right");

    let index = 0;
    let startX = 0;
    let currentTranslate = 0;
    let prevTranslate = 0;
    let dragging = false;

    function updateSlide() {
        currentTranslate = index * -350;
        track.style.transform = `translateX(${currentTranslate}px)`;
    }

    next.onclick = () => {
        if (index < slides.length - 1) index++;
        updateSlide();
    };

    prev.onclick = () => {
        if (index > 0) index--;
        updateSlide();
    };

    track.addEventListener("touchstart", startDrag);
    track.addEventListener("mousedown", startDrag);

    function startDrag(e) {
        dragging = true;
        startX = e.touches ? e.touches[0].clientX : e.clientX;
        prevTranslate = currentTranslate;

        window.addEventListener("mousemove", moveDrag);
        window.addEventListener("touchmove", moveDrag);
        window.addEventListener("mouseup", endDrag);
        window.addEventListener("touchend", endDrag);
    }

    function moveDrag(e) {
        if (!dragging) return;
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const delta = x - startX;
        currentTranslate = prevTranslate + delta;
        track.style.transform = `translateX(${currentTranslate}px)`;
    }

    function endDrag() {
        dragging = false;

        const moved = currentTranslate - prevTranslate;

        if (moved < -80 && index < slides.length - 1) index++;
        if (moved > 80 && index > 0) index--;

        updateSlide();

        window.removeEventListener("mousemove", moveDrag);
        window.removeEventListener("touchmove", moveDrag);
        window.removeEventListener("mouseup", endDrag);
        window.removeEventListener("touchend", endDrag);
    }
</script>

</body>
</html>
