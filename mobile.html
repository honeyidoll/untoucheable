<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mona Lore — Mobile</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Lora&family=Special+Elite&display=swap" rel="stylesheet">

<style>
body {
    background: #EFCE7B20;
    margin: 0;
    font-family: 'Lora', serif;
}

/* MOBILE PROFILE SECTION */
#mobile-profile {
    padding: 20px;
    text-align: center;
    color: #2B2B23;
}

.profile-photo {
    width: 90px;
    height: 90px;
    background: #D3C2CD;
    border-radius: 50%;
    margin: 0 auto 10px;
}

.profile-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    color: #D17089;
}

.profile-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 10px 0;
    font-size: 14px;
}

.profile-bio {
    font-style: italic;
    margin-bottom: 6px;
}

.profile-link {
    font-size: 13px;
    color: #6777B6;
    margin-bottom: 15px;
}

/* PREVIEW GRID */
.preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 0 6px;
}

.preview-box {
    width: 100%;
    aspect-ratio: 3 / 4;
    border-radius: 6px;
    background-size: cover;
    background-position: center;
    background-color: #D3C2CD;
    cursor: pointer;
}

/* EMPTY SLOT — INVISIBLE */
.preview-box.empty {
    background: none;
    cursor: default;
}

/* POST VIEW */
.post-title {
    font-family: 'Cormorant Garamond', serif;
    color: #2B2B23;
    font-size: 22px;
    margin: 20px 0 10px;
    text-align: center;
}

.slider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.slider button {
    background: none;
    border: none;
    font-size: 28px;
    color: #6777B680;
    cursor: pointer;
}

.slider img {
    width: 260px;
    border-radius: 12px;
}

.notes-toggle {
    margin-top: 8px;
    text-align: left;
    width: 260px;
    margin-left: auto;
    margin-right: auto;
    font-size: 14px;
    color: #6777B6;
    cursor: pointer;
}

.notes-panel {
    display: none;
    width: 260px;
    margin: 6px auto 25px;
    font-family: 'Special Elite', monospace;
    font-size: 14px;
}
</style>

</head>
<body>

<div id="mobile-profile">
    <div class="profile-photo"></div>
    <div class="profile-name">Mona</div>

    <div class="profile-stats">
        <div>0 posts</div>
        <div>127 works</div>
        <div>10 interests</div>
    </div>

    <div class="profile-bio">SHE | HER | HIS 🌸🌸</div>

    <div class="profile-link">open.spotify.com/user/315edpfbyt...</div>

    <div class="preview-grid" id="preview-grid"></div>
</div>

<div id="single-post"></div>

<script>
fetch("https://honeyidoll.github.io/Photos/aphotos.json")
  .then(r => r.json())
  .then(data => {

      const previewGrid = document.getElementById("preview-grid");
      const singlePost = document.getElementById("single-post");

      const groupNames = Object.keys(data.groups);

      /* PREVIEW BOXES */
      groupNames.forEach(name => {
          const group = data.groups[name];
          const firstImage = group.photos[0];

          const box = document.createElement("div");
          box.className = "preview-box";
          box.style.backgroundImage = `url(https://honeyidoll.github.io/Photos/${firstImage})`;

          box.onclick = () => openSinglePost(name, group);

          previewGrid.appendChild(box);
      });

      /* EMPTY SLOTS */
      const remainder = groupNames.length % 3;
      if (remainder !== 0) {
          const emptySlots = 3 - remainder;
          for (let i = 0; i < emptySlots; i++) {
              const empty = document.createElement("div");
              empty.className = "preview-box empty";
              previewGrid.appendChild(empty);
          }
      }

      /* SINGLE POST VIEW */
      function openSinglePost(name, group) {
          const images = group.photos;
          const notes = group.notes || [];

          previewGrid.style.display = "none";
          singlePost.innerHTML = "";

          const title = document.createElement("div");
          title.className = "post-title";
          title.textContent = name;
          singlePost.appendChild(title);

          const slider = document.createElement("div");
          slider.className = "slider";

          const left = document.createElement("button");
          left.textContent = "‹";

          const right = document.createElement("button");
          right.textContent = "›";

          const img = document.createElement("img");
          let index = 0;
          img.src = `https://honeyidoll.github.io/Photos/${images[index]}`;

          left.onclick = () => {
              if (index > 0) index--;
              img.src = `https://honeyidoll.github.io/Photos/${images[index]}`;
          };

          right.onclick = () => {
              if (index < images.length - 1) index++;
              img.src = `https://honeyidoll.github.io/Photos/${images[index]}`;
          };

          slider.appendChild(left);
          slider.appendChild(img);
          slider.appendChild(right);
          singlePost.appendChild(slider);

          const toggle = document.createElement("div");
          toggle.className = "notes-toggle";
          toggle.textContent = notes.length ? `View ${notes.length} notes` : "No notes";
          singlePost.appendChild(toggle);

          const panel = document.createElement("div");
          panel.className = "notes-panel";

          notes.forEach(n => {
              const div = document.createElement("div");
              div.innerHTML = `<strong>mona</strong> ${n}`;
              panel.appendChild(div);
          });

          singlePost.appendChild(panel);

          toggle.onclick = () => {
              panel.style.display = panel.style.display === "none" ? "block" : "none";
          };
      }
});
</script>

</body>
</html>
